<!-- script-generator.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadAI Script Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060A12;
            --surface: #0E1828;
            --surface2: #14213A;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.13);
            --green: #00D97E;
            --green-dim: rgba(0,217,126,0.10);
            --amber: #F59E0B;
            --red: rgba(239,68,68,0.9);
            --text: #EDF0F7;
            --muted: rgba(237,240,247,0.52);
            --muted2: rgba(237,240,247,0.28);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Instrument Sans', sans-serif;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.1;
        }

        .header {
            text-align: center;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }

        .card {
            background-color: var(--surface);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border-radius: 9px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border2);
            color: var(--text);
            font-family: 'Instrument Sans', sans-serif;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: rgba(0,217,126,0.4);
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 200ms ease;
            border: none;
        }

        .btn-primary {
            background: var(--green);
            color: #060A12;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--muted);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .video-preview {
            position: relative;
            width: 100%;
            height: 400px;
            background: var(--surface2);
            border-radius: 16px;
            overflow: hidden;
            margin: 2rem 0;
        }

        .video-controls {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
            min-height: 120px;
        }

        .media-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: var(--surface2);
            cursor: move;
            transition: all 200ms ease;
            border: 2px solid transparent;
        }

        .media-item:hover {
            transform: translateY(-3px);
            border: 1px solid var(--border2);
        }

        .media-item.selected {
            border: 2px solid var(--green);
        }

        .media-item img, .media-item video {
            width: 100%;
            height: 100px;
            object-fit: cover;
            display: block;
        }

        .drag-handle {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            cursor: move;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .setting-group {
            margin-bottom: 1rem;
        }

        .preview-container {
            position: relative;
            width: 100%;
            height: 300px;
            background: var(--surface2);
            border-radius: 16px;
            overflow: hidden;
            margin: 1rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timeline {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .time-marker {
            flex: 1;
            height: 4px;
            background: var(--surface2);
            position: relative;
        }

        .time-marker::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 30%;
            background: var(--green);
        }

        .media-counter {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .video-player {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .video-canvas {
            width: 100%;
            height: 100%;
            background: #000;
        }

        .caption-overlay {
            position: absolute;
            bottom: 20%;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            padding: 0 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .caption-overlay.active {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .card {
                padding: 1.5rem;
            }
            
            .settings-grid {
                grid-template-columns: 1fr;
            }
            
            .video-controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Video Generator</h1>
            <p>Create professional short videos for your business</p>
        </div>

        <div class="card">
            <h2>Script Generation</h2>
            <div class="form-group">
                <label for="topic">Topic</label>
                <input type="text" id="topic" placeholder="Enter your video topic...">
            </div>
            
            <div class="form-group">
                <label for="script">Generated Script</label>
                <textarea id="script" rows="6" placeholder="Your script will appear here..."></textarea>
            </div>
            
            <button id="generate-script" class="btn btn-primary">Generate Script</button>
        </div>

        <div class="card">
            <h2>Media Selection</h2>
            <div class="form-group">
                <label for="media-type">Media Type</label>
                <select id="media-type">
                    <option value="stock">Stock Footage</option>
                    <option value="photo">User Photo</option>
                    <option value="ai-scene">AI Scene</option>
                    <option value="animated">Animated Style</option>
                </select>
            </div>
            
            <div class="media-grid" id="media-grid">
                <!-- Media items will be populated here -->
            </div>
            <div class="media-counter" id="media-counter">0 items selected</div>
        </div>

        <div class="card">
            <h2>Video Settings</h2>
            <div class="settings-grid">
                <div>
                    <h3>Captions</h3>
                    <div class="setting-group">
                        <label for="captions-style">Captions Style</label>
                        <select id="captions-style">
                            <option value="none">None</option>
                            <option value="bold">Bold Animated</option>
                            <option value="subtle">Subtle</option>
                            <option value="highlight">Highlight Words</option>
                        </select>
                    </div>
                    
                    <div class="setting-group">
                        <label for="words-per-caption">Words Per Caption</label>
                        <select id="words-per-caption">
                            <option value="none">None</option>
                            <option value="1">1 Word</option>
                            <option value="2">2 Words</option>
                            <option value="3">3 Words</option>
                            <option value="4">4 Words</option>
                            <option value="line">Per Line</option>
                        </select>
                    </div>
                </div>
                
                <div>
                    <h3>Video Effects</h3>
                    <div class="setting-group">
                        <label for="brightness">Image Brightness</label>
                        <input type="range" id="brightness" min="0" max="200" value="100">
                        <span id="brightness-value">100%</span>
                    </div>
                    
                    <div class="setting-group">
                        <label for="speed">Playback Speed</label>
                        <select id="speed">
                            <option value="0.25">0.25x (Very Slow)</option>
                            <option value="0.5">0.5x (Slow)</option>
                            <option value="1" selected>1x (Normal)</option>
                            <option value="1.5">1.5x (Fast)</option>
                            <option value="2">2x (Very Fast)</option>
                        </select>
                    </div>
                </div>
                
                <div>
                    <h3>Voice Options</h3>
                    <div class="setting-group">
                        <label for="voice-engine">Voice Engine</label>
                        <select id="voice-engine">
                            <option value="fish">Fish Audio (Default)</option>
                            <option value="elevenlabs">ElevenLabs</option>
                            <option value="openai">OpenAI TTS</option>
                            <option value="none">None</option>
                        </select>
                    </div>
                    
                    <div class="setting-group">
                        <label for="script-option">Script Option</label>
                        <select id="script-option">
                            <option value="with-script">With Script</option>
                            <option value="without-script">Without Script</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Preview</h2>
            <div class="preview-container">
                <div id="video-preview" class="video-player">
                    <canvas id="preview-canvas" class="video-canvas"></canvas>
                    <div id="caption-overlay" class="caption-overlay">Preview Caption</div>
                </div>
            </div>
            
            <div class="video-controls">
                <button id="play-pause" class="btn btn-primary">Play</button>
                <button id="pause-btn" class="btn btn-secondary">Pause</button>
                <button id="regenerate" class="btn btn-secondary">Regenerate Preview</button>
                <button id="add-media" class="btn btn-secondary">Add More Media</button>
            </div>
        </div>

        <div class="card">
            <h2>Timeline</h2>
            <div class="timeline">
                <div class="time-marker"></div>
                <div class="time-marker"></div>
                <div class="time-marker"></div>
                <div class="time-marker"></div>
                <div class="time-marker"></div>
            </div>
        </div>

        <div class="card">
            <button id="generate-video" class="btn btn-primary" style="width:100%;">Generate Final Video</button>
        </div>
    </div>

    <script>
        // DOM Elements
        const mediaGrid = document.getElementById('media-grid');
        const brightnessSlider = document.getElementById('brightness');
        const brightnessValue = document.getElementById('brightness-value');
        const playPauseBtn = document.getElementById('play-pause');
        const pauseBtn = document.getElementById('pause-btn');
        const regenerateBtn = document.getElementById('regenerate');
        const addMediaBtn = document.getElementById('add-media');
        const generateVideoBtn = document.getElementById('generate-video');
        const generateScriptBtn = document.getElementById('generate-script');
        const scriptTextarea = document.getElementById('script');
        const mediaCounter = document.getElementById('media-counter');
        const previewCanvas = document.getElementById('preview-canvas');
        const captionOverlay = document.getElementById('caption-overlay');
        const ctx = previewCanvas.getContext('2d');
        
        // State variables
        let isPlaying = false;
        let mediaItems = [];
        let selectedMedia = [];
        let currentMediaIndex = 0;
        let animationFrameId = null;
        let previewStartTime = 0;
        let previewDuration = 0;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Set canvas size
            previewCanvas.width = previewCanvas.offsetWidth;
            previewCanvas.height = previewCanvas.offsetHeight;
            
            // Load sample media items
            loadSampleMedia();
            
            // Event listeners
            brightnessSlider.addEventListener('input', updateBrightness);
            playPauseBtn.addEventListener('click', playPreview);
            pauseBtn.addEventListener('click', pausePreview);
            regenerateBtn.addEventListener('click', regeneratePreview);
            addMediaBtn.addEventListener('click', addMoreMedia);
            generateVideoBtn.addEventListener('click', generateFinalVideo);
            generateScriptBtn.addEventListener('click', generateScript);
            
            // Initialize sortable media grid
            initSortableMedia();
            
            // Initialize preview
            initPreview();
        });
        
        // Load sample media items
        function loadSampleMedia() {
            mediaItems = [
                { id: 1, type: 'image', url: 'https://placehold.co/300x200/14213A/FFFFFF?text=Image+1' },
                { id: 2, type: 'video', url: 'https://placehold.co/300x200/14213A/FFFFFF?text=Video+1' },
                { id: 3, type: 'image', url: 'https://placehold.co/300x200/14213A/FFFFFF?text=Image+2' },
                { id: 4, type: 'video', url: 'https://placehold.co/300x200/14213A/FFFFFF?text=Video+2' },
                { id: 5, type: 'image', url: 'https://placehold.co/300x200/14213A/FFFFFF?text=Image+3' },
                { id: 6, type: 'video', url: 'https://placehold.co/300x200/14213A/FFFFFF?text=Video+3' }
            ];
            
            renderMediaGrid();
        }
        
        // Render media grid
        function renderMediaGrid() {
            mediaGrid.innerHTML = '';
            mediaItems.forEach(item => {
                const mediaElement = document.createElement('div');
                mediaElement.className = 'media-item';
                mediaElement.dataset.id = item.id;
                mediaElement.draggable = true;
                
                if (item.type === 'image') {
                    mediaElement.innerHTML = `
                        <img src="${item.url}" alt="Media ${item.id}">
                        <div class="drag-handle">⋮</div>
                    `;
                } else {
                    mediaElement.innerHTML = `
                        <video muted>
                            <source src="${item.url}" type="video/mp4">
                        </video>
                        <div class="drag-handle">⋮</div>
                    `;
                }
                
                mediaElement.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleMediaSelection(item.id);
                });
                
                mediaGrid.appendChild(mediaElement);
            });
            
            updateMediaCounter();
        }
        
        // Toggle media selection
        function toggleMediaSelection(id) {
            const index = selectedMedia.indexOf(id);
            const mediaElement = document.querySelector(`.media-item[data-id="${id}"]`);
            
            if (index === -1) {
                selectedMedia.push(id);
                mediaElement.classList.add('selected');
            } else {
                selectedMedia.splice(index, 1);
                mediaElement.classList.remove('selected');
            }
            
            updateMediaCounter();
            console.log('Selected media:', selectedMedia);
        }
        
        // Update media counter
        function updateMediaCounter() {
            mediaCounter.textContent = `${selectedMedia.length} items selected`;
        }
        
        // Initialize sortable media
        function initSortableMedia() {
            let draggedItem = null;
            
            mediaGrid.addEventListener('dragstart', (e) => {
                if (e.target.classList.contains('media-item')) {
                    draggedItem = e.target;
                    setTimeout(() => {
                        e.target.style.opacity = '0.5';
                    }, 0);
                }
            });
            
            mediaGrid.addEventListener('dragend', (e) => {
                setTimeout(() => {
                    if (e.target.classList.contains('media-item')) {
                        e.target.style.opacity = '1';
                    }
                    draggedItem = null;
                }, 0);
            });
            
            mediaGrid.addEventListener('dragover', (e) => {
                e.preventDefault();
            });
            
            mediaGrid.addEventListener('dragenter', (e) => {
                e.preventDefault();
                if (e.target.classList.contains('media-item') && e.target !== draggedItem) {
                    e.target.style.backgroundColor = '#1a2a4a';
                }
            });
            
            mediaGrid.addEventListener('dragleave', (e) => {
                if (e.target.classList.contains('media-item')) {
                    e.target.style.backgroundColor = '';
                }
            });
            
            mediaGrid.addEventListener('drop', (e) => {
                e.preventDefault();
                if (e.target.classList.contains('media-item') && draggedItem !== e.target) {
                    const allItems = Array.from(mediaGrid.querySelectorAll('.media-item'));
                    const draggedIndex = allItems.indexOf(draggedItem);
                    const targetIndex = allItems.indexOf(e.target);
                    
                    if (draggedIndex < targetIndex) {
                        e.target.parentNode.insertBefore(draggedItem, e.target.nextSibling);
                    } else {
                        e.target.parentNode.insertBefore(draggedItem, e.target);
                    }
                    
                    e.target.style.backgroundColor = '';
                }
            });
        }
        
        // Update brightness value display
        function updateBrightness() {
            brightnessValue.textContent = `${brightnessSlider.value}%`;
            // Apply brightness to preview
            updatePreview();
        }
        
        // Play preview
        function playPreview() {
            if (selectedMedia.length === 0) {
                alert('Please select some media first');
                return;
            }
            
            isPlaying = true;
            playPauseBtn.textContent = 'Playing...';
            playPauseBtn.disabled = true;
            pauseBtn.disabled = false;
            
            previewStartTime = Date.now();
            previewDuration = selectedMedia.length * 3000; // 3 seconds per media
            
            animatePreview();
        }
        
        // Pause preview
        function pausePreview() {
            isPlaying = false;
            playPauseBtn.textContent = 'Play';
            playPauseBtn.disabled = false;
            pauseBtn.disabled = true;
            
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }
        
        // Animate preview
        function animatePreview() {
            if (!isPlaying) return;
            
            const elapsed = Date.now() - previewStartTime;
            const progress = Math.min(elapsed / previewDuration, 1);
            
            // Calculate current media index
            currentMediaIndex = Math.floor(progress * selectedMedia.length);
            if (currentMediaIndex >= selectedMedia.length) currentMediaIndex = selectedMedia.length - 1;
            
            // Draw current media
            drawCurrentMedia(currentMediaIndex);
            
            // Show captions if enabled
            updateCaptions(currentMediaIndex);
            
            if (progress < 1) {
                animationFrameId = requestAnimationFrame(animatePreview);
            } else {
                pausePreview();
            }
        }
        
        // Draw current media
        function drawCurrentMedia(index) {
            if (index < 0 || index >= selectedMedia.length) return;
            
            const mediaId = selectedMedia[index];
            const mediaItem = mediaItems.find(item => item.id === mediaId);
            
            if (!mediaItem) return;
            
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);
            
            // Draw placeholder for media
            ctx.fillStyle = '#14213A';
            ctx.fillRect(50, 50, previewCanvas.width - 100, previewCanvas.height - 100);
            
            ctx.font = '20px Syne';
            ctx.fillStyle = '#FFF';
            ctx.textAlign = 'center';
            ctx.fillText(
                mediaItem.type === 'image' ? 'Image Preview' : 'Video Preview',
                previewCanvas.width / 2,
                previewCanvas.height / 2
            );
            
            ctx.font = '14px Instrument Sans';
            ctx.fillText(`Media ${mediaId}`, previewCanvas.width / 2, previewCanvas.height / 2 + 30);
        }
        
        // Update captions
        function updateCaptions(index) {
            const captionsStyle = document.getElementById('captions-style').value;
            const wordsPerCaption = document.getElementById('words-per-caption').value;
            
            if (captionsStyle === 'none' || wordsPerCaption === 'none') {
                captionOverlay.classList.remove('active');
                return;
            }
            
            captionOverlay.classList.add('active');
            
            // Get script text
            const scriptText = scriptTextarea.value || "Sample caption text for preview";
            
            // Split into words
            const words = scriptText.split(/\s+/);
            
            // Calculate which words to show
            const wordsToShow = parseInt(wordsPerCaption) || words.length;
            const startIndex = index * wordsToShow;
            const endIndex = Math.min(startIndex + wordsToShow, words.length);
            
            const captionText = words.slice(startIndex, endIndex).join(' ');
            captionOverlay.textContent = captionText;
        }
        
        // Regenerate preview
        function regeneratePreview() {
            console.log('Regenerating preview with settings:');
            console.log('- Captions Style:', document.getElementById('captions-style').value);
            console.log('- Words Per Caption:', document.getElementById('words-per-caption').value);
            console.log('- Brightness:', brightnessSlider.value);
            console.log('- Speed:', document.getElementById('speed').value);
            console.log('- Voice Engine:', document.getElementById('voice-engine').value);
            console.log('- Script Option:', document.getElementById('script-option').value);
            
            // Update preview with current settings
            updatePreview();
        }
        
        // Update preview based on settings
        function updatePreview() {
            const captionsStyle = document.getElementById('captions-style').value;
            const wordsPerCaption = document.getElementById('words-per-caption').value;
            const brightness = brightnessSlider.value;
            const speed = document.getElementById('speed').value;
            const voiceEngine = document.getElementById('voice-engine').value;
            const scriptOption = document.getElementById('script-option').value;
            
            // Apply settings visually
            previewCanvas.style.filter = `brightness(${brightness}%)`;
            
            // Update caption visibility
            if (captionsStyle === 'none' || wordsPerCaption === 'none') {
                captionOverlay.classList.remove('active');
            } else {
                captionOverlay.classList.add('active');
            }
        }
        
        // Add more media
        function addMoreMedia() {
            // Add sample media items
            const newId = mediaItems.length + 1;
            const newType = Math.random() > 0.5 ? 'image' : 'video';
            
            mediaItems.push({
                id: newId,
                type: newType,
                url: `https://placehold.co/300x200/14213A/FFFFFF?text=${newType.charAt(0).toUpperCase() + newType.slice(1)}+${newId}`
            });
            
            renderMediaGrid();
            console.log('Added new media item');
        }
        
        // Initialize preview
        function initPreview() {
            // Set initial state
            pauseBtn.disabled = true;
            
            // Draw initial preview
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);
            
            ctx.fillStyle = '#FFF';
            ctx.font = '20px Syne';
            ctx.textAlign = 'center';
            ctx.fillText('Preview will appear here', previewCanvas.width / 2, previewCanvas.height / 2);
        }
        
        // Generate final video
        function generateFinalVideo() {
            if (selectedMedia.length === 0) {
                alert('Please select some media first');
                return;
            }
            
            console.log('Generating final video with settings:');
            console.log('- Selected Media:', selectedMedia);
            console.log('- Captions Style:', document.getElementById('captions-style').value);
            console.log('- Words Per Caption:', document.getElementById('words-per-caption').value);
            console.log('- Brightness:', brightnessSlider.value);
            console.log('- Speed:', document.getElementById('speed').value);
            console.log('- Voice Engine:', document.getElementById('voice-engine').value);
            console.log('- Script Option:', document.getElementById('script-option').value);
            
            alert('Video generation started! This would normally process your selected media with the specified settings.');
        }
        
        // Generate script
        function generateScript() {
            const topic = document.getElementById('topic').value;
            if (!topic.trim()) {
                alert('Please enter a topic first');
                return;
            }
            
            // Simulate script generation
            scriptTextarea.value = `HOOK: Did you know that 80% of real estate agents struggle with getting leads?\n\nBODY: With our proven system, you can generate consistent leads without cold calling or expensive ads.\n\nCTA: Click the link in bio to get your free strategy session!`;
            
            console.log('Script generated for topic:', topic);
        }
    </script>
</body>
</html>
