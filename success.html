<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LeadAI — Payment Successful</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#060A12;--surface:#0E1828;--border:rgba(255,255,255,0.1);--green:#00D97E;--text:#EDF0F7;--muted:rgba(237,240,247,0.52)}
    body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
    body::before{content:'';position:fixed;top:-10%;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(0,217,126,0.1) 0%,transparent 70%);pointer-events:none}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3rem 2.5rem;max-width:480px;width:100%;text-align:center;position:relative;z-index:1}
    .icon{font-size:3.5rem;margin-bottom:1.25rem;animation:pop .5s ease both}
    @keyframes pop{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
    .plan-badge{display:inline-block;background:rgba(0,217,126,0.12);border:1px solid rgba(0,217,126,0.28);color:var(--green);font-size:.78rem;font-weight:600;padding:.3rem 1rem;border-radius:100px;margin-bottom:1.5rem;text-transform:capitalize}
    h1{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;letter-spacing:-.04em;margin-bottom:.75rem}
    h1 em{font-style:normal;color:var(--green)}
    .credit-count{font-family:'Syne',sans-serif;font-size:3rem;font-weight:800;color:var(--green);margin:.5rem 0}
    p{color:var(--muted);line-height:1.75;margin-bottom:2rem}
    .btn{display:inline-flex;align-items:center;gap:.5rem;background:var(--green);color:#060A12;font-family:'Instrument Sans',sans-serif;font-weight:700;font-size:1rem;padding:.9rem 2rem;border-radius:10px;text-decoration:none;transition:opacity .2s}
    .btn:hover{opacity:.88}
    .detail{font-size:.78rem;color:var(--muted);margin-top:1.25rem}
  </style>
</head>
<body>
<div class="card">
  <div class="icon" id="icon">🎉</div>
  <div class="plan-badge" id="planBadge">Loading...</div>
  <h1>Welcome to <em>LeadAI</em></h1>
  <div class="credit-count" id="creditCount" style="display:none"></div>
  <p id="message">Your payment was successful. You now have access to generate professional lead videos.</p>
  <a href="script-generator.html" class="btn">✦ Start Generating Videos</a>
  <div class="detail" id="detail"></div>
</div>

<script>
  var params = new URLSearchParams(window.location.search);
  var plan = params.get('plan') || 'pro';
  var qty  = parseInt(params.get('qty') || '1');

  var badge   = document.getElementById('planBadge');
  var msg     = document.getElementById('message');
  var credit  = document.getElementById('creditCount');
  var detail  = document.getElementById('detail');

  if (plan === 'credits') {
    // Pay-per-video credits
    badge.textContent = qty + ' Video Credit' + (qty !== 1 ? 's' : '');
    credit.style.display = 'block';
    credit.textContent = qty + ' credit' + (qty !== 1 ? 's' : '');
    msg.textContent = 'Each credit generates one complete video with real voice and synced captions. Credits never expire — use them at your own pace.';
    detail.textContent = 'No subscription · Credits roll over forever';

    // Add credits to localStorage
    var existing = parseInt(localStorage.getItem('leadai_credits') || '0');
    localStorage.setItem('leadai_credits', String(existing + qty));

  } else if (plan === 'pro') {
    badge.textContent = 'Pro Plan — $29/month';
    msg.textContent = '30 videos per month. Real voice, synced captions, trending video tab, scene-matched visuals. Cancel anytime.';
    detail.textContent = 'Renews monthly · Cancel anytime at billing.stripe.com';
    localStorage.setItem('leadai_paid', 'true');
    localStorage.setItem('leadai_plan', 'pro');
    localStorage.setItem('leadai_paid_at', Date.now().toString());

  } else if (plan === 'agency') {
    badge.textContent = 'Agency Plan — $79/month';
    msg.textContent = '100 videos per month with ElevenLabs premium voice, trending tab, and priority generation.';
    detail.textContent = 'Renews monthly · Cancel anytime at billing.stripe.com';
    localStorage.setItem('leadai_paid', 'true');
    localStorage.setItem('leadai_plan', 'agency');
    localStorage.setItem('leadai_paid_at', Date.now().toString());
  }
</script>
</body>
</html>
